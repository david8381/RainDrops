<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rain Math</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top-bar">
        <div class="brand">
          <div class="logo">MR</div>
          <div>
            <div class="title">Rain Math</div>
            <div class="subtitle">Clear the drops before they hit the ground.</div>
          </div>
        </div>
        <div class="stats">
          <div><span class="label">Score</span> <span id="score">0</span></div>
        </div>
        <div class="version">v0.2.4</div>
      </header>

      <nav class="controls-bar">
        <div class="op-chits">
          <button class="op-chit has-tip" data-op="add" data-tip="Addition&#10;Example: 3 + 5 → type 8">+</button>
          <button class="op-chit has-tip" data-op="sub" data-tip="Subtraction&#10;Example: 9 − 4 → type 5">&minus;</button>
          <button class="op-chit has-tip" data-op="mul" data-tip="Multiplication&#10;Example: 6 × 7 → type 42">&times;</button>
          <button class="op-chit has-tip" data-op="div" data-tip="Division&#10;Example: 24 ÷ 6 → type 4">&divide;</button>
          <button class="op-chit has-tip" data-op="f10" data-tip="Factors of 10&#10;Example: 3.5 × 100 → type 350">x10</button>
          <button class="op-chit has-tip" data-op="si" data-tip="SI metric conversions&#10;Example: km → m → type *1000 + Enter&#10;Example: m → km → type /1000 + Enter&#10;Example: cm → m → type /100 + Enter">SI</button>
          <button class="op-chit has-tip" data-op="rect" data-tip="Rectangle perimeter &amp; area&#10;Example: P▭ 3×5 → type 16&#10;Example: A▭ 3×5 → type 15">▭</button>
          <button class="op-chit has-tip" data-op="circ" data-tip="Circle (answer is the π coefficient)&#10;Example: C○ r=3 =?π → type 6&#10;Example: A○ r=3 =?π → type 9">○</button>
          <button class="op-chit has-tip" data-op="factor" data-tip="Prime factorization&#10;Example: 36 → type 2^2*3^2 + Enter&#10;  or type 2*2*3*3 + Enter&#10;Example: 15 → type 3*5 + Enter&#10;&#10;Tip: Tab to target and type divisors&#10;to simplify step by step">p·q</button>
        </div>
      </nav>

      <section class="main-grid">
        <div class="play-col">
          <section class="game">
            <canvas id="canvas" width="900" height="520"></canvas>
            <div class="ground"></div>
          </section>

          <footer class="input-bar">
            <div class="input-wrap">
              <label for="answer">Type answer</label>
              <input id="answer" type="text" autocomplete="off" />
              <div class="hint" id="inputHint">Select a problem type to begin.</div>
            </div>
            <div class="buttons">
              <button id="pauseBtn">Pause</button>
              <button id="restartBtn">Restart</button>
            </div>
          </footer>
        </div>

        <aside class="side-panel" id="sidePanel">
          <div class="sliders-row">
            <div class="slider-card">
              <div class="slider-header">Speed</div>
              <div class="slider-wrap">
                <input type="range" id="speedSlider" min="0" max="100" value="30" orient="vertical" />
              </div>
              <div id="speedValue" class="slider-num">30%</div>
            </div>
            <div class="slider-card">
              <div class="slider-header">Rate</div>
              <div class="slider-wrap">
                <input type="range" id="rateSlider" min="0" max="10" value="3" orient="vertical" />
              </div>
              <div id="rateValue" class="slider-num">3</div>
            </div>
            <div class="slider-card">
              <div class="slider-header">Pace</div>
              <div class="slider-wrap">
                <input type="range" id="paceSlider" min="1" max="10" value="5" orient="vertical" />
              </div>
              <div id="paceValue" class="slider-num">6s</div>
            </div>
          </div>

          <div id="diffCards" class="diff-cards"></div>
        </aside>
      </section>
    </main>

    <div id="touchKeypad" class="touch-keypad hidden">
      <div class="kp-display-row">
        <div class="kp-input-display" id="kpDisplay">&nbsp;</div>
        <div class="kp-hint" id="kpHint"></div>
        <button class="kp-action" id="kpPauseBtn">Pause</button>
        <button class="kp-action" id="kpRestartBtn">Restart</button>
      </div>
      <div class="keypad-row">
        <button class="kp-key" data-key="1">1</button>
        <button class="kp-key" data-key="2">2</button>
        <button class="kp-key" data-key="3">3</button>
        <button class="kp-key kp-op" data-key="*">*</button>
        <button class="kp-key kp-op" data-key="^">^</button>
      </div>
      <div class="keypad-row">
        <button class="kp-key" data-key="4">4</button>
        <button class="kp-key" data-key="5">5</button>
        <button class="kp-key" data-key="6">6</button>
        <button class="kp-key kp-op" data-key="/">/</button>
        <button class="kp-key kp-op" data-key="-">&minus;</button>
      </div>
      <div class="keypad-row">
        <button class="kp-key" data-key="7">7</button>
        <button class="kp-key" data-key="8">8</button>
        <button class="kp-key" data-key="9">9</button>
        <button class="kp-key" data-key="0">0</button>
        <button class="kp-key kp-del" data-key="Backspace">&#9003;</button>
      </div>
      <div class="keypad-row">
        <button class="kp-key kp-enter" data-key="Enter">Enter</button>
        <button class="kp-key kp-tab" data-key="Tab">Tab</button>
        <button class="kp-key kp-dot" data-key=".">.</button>
      </div>
    </div>

    <div id="pauseOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Game paused">
      <div class="card pause-card">
        <h1>Paused</h1>
        <p>Press Escape or click Resume</p>
        <button id="resumeBtnOverlay" class="primary">Resume</button>
      </div>
    </div>

    <script src="script.js"></script>
    <script data-goatcounter="https://mathrain.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
